# 服务器配置：定义服务端口和编码设置
server:
  port: 8090
  tomcat:
    uri-encoding: UTF-8

# Spring框架基础配置：环境、应用名称和服务注册中心
spring:
  profiles:
    active: dev
  application:
    name: remark-service
  cloud:
    nacos:
      config:
        file-extension: yaml
        # 共享配置列表：从Nacos配置中心加载的公共配置文件
        shared-configs:
          - data-id: shared-spring.yaml
            refresh: false   #引用的共享配置在此服务不支持配置热更新
          - data-id: shared-redis.yaml
            refresh: false
          - data-id: shared-mybatis.yaml
            refresh: false
          - data-id: shared-logs.yaml
            refresh: false
          - data-id: shared-feign.yaml
            refresh: false
          - data-id: shared-mq.yaml
            refresh: false

# 天机学堂自定义配置：Swagger文档、数据库和认证授权
tj:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.tianji.remark.controller
    title: 天机学堂 - 评论中心接口文档
    description: 该服务包含用户点赞、评论相关功能
    contact-name: 传智教育·研究院
    contact-url: http://www.itcast.cn/
    contact-email: zhanghuyi@itcast.cn
    version: v1.0
  jdbc:
    database: tj_remark
  auth:
    resource:
      enable: true
